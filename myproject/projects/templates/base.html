<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Новостной портал города{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">Новостной портал</a>
        <div class="navbar-nav ms-auto">
          {% if user.is_authenticated %}
          <span class="navbar-text me-3">Привет, {{ user.username }}!</span>
          {% if user.is_staff %}
          <a
            class="nav-link text-warning"
            href="{% url 'admin:index' %}"
            target="_blank"
          >
          </a>
          {% endif %}
          <a class="nav-link" href="{% url 'saved_articles' %}">Избранное</a>
          <form action="{% url 'logout' %}" method="post" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-link nav-link d-inline p-0" style="display:inline; border:none; background:none;">
        Выход
    </button>
</form>

          {% else %}
          <a class="nav-link" href="{% url 'login' %}">Войти</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
